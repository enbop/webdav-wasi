name: Release WASM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-wasm:
    name: Build webdav-wasi WASM
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Run tests
        run: cargo test

      - name: Build WASM
        run: cargo build --release --target=wasm32-wasip2 --no-default-features --features wasmtime-serve --bin webdav-wasi

      - name: Prepare release assets
        run: |
          cp target/wasm32-wasip2/release/webdav-wasi.wasm ./webdav-wasi.wasm
          sha256sum ./webdav-wasi.wasm > ./webdav-wasi.wasm.sha256

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webdav-wasi-wasm
          path: |
            webdav-wasi.wasm
            webdav-wasi.wasm.sha256

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            webdav-wasi.wasm
            webdav-wasi.wasm.sha256
